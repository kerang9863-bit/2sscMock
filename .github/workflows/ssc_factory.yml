name: SSC Quiz Factory Pro v3.0

on:
  schedule:
    # Runs daily at 7:30 AM IST (2:00 AM UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Pip Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run SSC Quiz Factory Pro v3.1
        env:
          GROQ_API_KEYS: ${{ secrets.GROQ_API_KEYS }}
          OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ssc_quiz_factory_pro_v3.py

      - name: Sync Memory & Database to Repository
        if: always()
        run: |
          git config --local user.email "quiz-factory@github.com"
          git config --local user.name "SSC-Quiz-Factory"

          # Track all persistence files used by v3.0
          git add global_memory.json ssc_question_db.json factory.log 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync quiz data: $(date -u +%Y-%m-%d-%H:%M) [run ${{ github.run_number }}]"
            git push || echo "Push failed or network conflict occurred."
          fi
